name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Change this to your main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build  # Adjust this command based on your build process

      - name: Configure Git
        run: |
          git config --global user.name "Maxim Lamare"
          git config --global user.email "32132761+maximlamare@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        run: npx gh-pages -d build --message "Deploying to GitHub Pages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Set the GitHub token for authentication